<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        .certificate-box {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .certificate-box img {
            max-width: 90%;
            max-height: 80vh;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            background-color: white;
        }

        .footer {
            padding: 30px;
            text-align: center;
            width: 100%;
        }

        .footer a {
            text-decoration: none;
            color: #0056b3;
            font-weight: bold;
            font-size: 18px;
            border: 2px solid #0056b3;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .footer a:hover {
            background-color: #0056b3;
            color: white;
        }

        #error-msg {
            color: #ff4d4d;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="certificate-box">
        <img id="certImage" src="" alt="Certificate Display" style="display: none;">
        <p id="error-msg">সার্টিফিকেট পাওয়া যায়নি! ইউআরএল চেক করুন।</p>
    </div>

    <div class="footer">
        <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas website</a>
    </div>

    <script>
        // ইউআরএল থেকে 'id' প্যারামিটার নেওয়া
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');
        const imgElement = document.getElementById('certImage');
        const errorElement = document.getElementById('error-msg');

        if (certId) {
            // আপনার আপলোড করা PNG ফাইলের নাম অনুযায়ী পাথ সেট হবে
            // মনে করুন ফাইলগুলো index.html এর পাশেই আছে
            imgElement.src = certId + ".png"; 
            imgElement.style.display = "block";
            
            // যদি ছবি না পাওয়া যায়
            imgElement.onerror = function() {
                this.style.display = "none";
                errorElement.style.display = "block";
            };
        } else {
            errorElement.textContent = "অনুগ্রহ করে লিংকের শেষে আইডি যুক্ত করুন।";
            errorElement.style.display = "block";
        }
    </script>

</body>
</html>
