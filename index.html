<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>

body {
    margin: 0;
    height: 100vh;
    background-size: cover;
    background-position: center;
    font-family: Arial;
}

/* FOOTER TEXT ONLY */
.footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

.footer a {
    text-decoration: none;
    color: black;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="footer">
    <a href="https://group.bureauveritas.com/" target="_blank">
        Visit Bureau Veritas Website
    </a>
</div>

<script>

// URL থেকে ID নেওয়া
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// যদি ID না থাকে → close
if (!id) {
    window.close();
}

// image path (folder name = images)
const imgPath = `images/${id}.png`;

// image load check
const img = new Image();

img.onload = function() {
    // image থাকলে background set
    document.body.style.background = `url('${imgPath}') no-repeat center center`;
    document.body.style.backgroundSize = "cover";
};

img.onerror = function() {
    // image না থাকলে page close
    window.close();
};

// load trigger
img.src = imgPath;

</script>

</body>
</html>
