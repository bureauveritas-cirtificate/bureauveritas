<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .certificate-box {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }
        .certificate-box img {
            max-width: 95%;
            max-height: 85vh;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            background-color: white;
            display: none;
        }
        .footer {
            padding: 40px;
            text-align: center;
            width: 100%;
        }
        .footer a {
            text-decoration: none;
            color: #d1121d;
            font-weight: bold;
            font-size: 18px;
            border: 2px solid #d1121d;
            padding: 12px 24px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .footer a:hover {
            background-color: #d1121d;
            color: white;
        }
        #error-msg {
            color: #333;
            font-weight: bold;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="certificate-box">
        <img id="certImage" src="" alt="Certificate">
        <div id="error-msg">
            <h2>Certificate Not Found</h2>
            <p>Please check the URL or ID again.</p>
        </div>
    </div>

    <div class="footer">
        <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas website</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');
        const imgElement = document.getElementById('certImage');
        const errorElement = document.getElementById('error-msg');

        if (certId) {
            imgElement.src = certId + ".png"; 
            
            imgElement.onload = function() {
                imgElement.style.display = "block";
                errorElement.style.display = "none";
            };

            imgElement.onerror = function() {
                imgElement.style.display = "none";
                errorElement.style.display = "block";
            };
        } else {
            errorElement.style.display = "block";
        }
    </script>

</body>
</html>
