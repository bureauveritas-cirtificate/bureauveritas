<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-size: cover;
    background-position: center;
    font-family: Arial, sans-serif;
}

/* FOOTER TEXT */
.footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

.footer a {
    text-decoration: none;
    color: black;
    font-weight: bold;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="footer">
    <a href="https://group.bureauveritas.com/" target="_blank">
        Visit Bureau Veritas Website
    </a>
</div>

<script>

// URL থেকে ID নেওয়া
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// যদি ID না থাকে → redirect
if (!id) {
    window.location.href = "https://group.bureauveritas.com/";
}

// image path
const imgPath = "images/" + id + ".png";

// image load check
const img = new Image();

img.onload = function() {
    document.body.style.background = `url('${imgPath}') no-repeat center center`;
    document.body.style.backgroundSize = "cover";
};

img.onerror = function() {
    // image না থাকলে redirect
    window.location.href = "https://group.bureauveritas.com/";
};

// trigger
img.src = imgPath;

</script>

</body>
</html>
